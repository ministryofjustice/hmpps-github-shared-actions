name: Security CodeQL Github Actions scan

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * MON-FRI"

permissions:
  contents: read
  security-events: write

jobs:
  security-codeql-scan:
    name: Security CodeQL Github Actions scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # 4.35.1
      with:
        languages: actions 
    - name: Perform CodeQL Analysis
      id: codeql_analysis
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # 4.35.1
    - name: CodeQL slack notification
      uses: ./.github/actions/slack_codescan_notification
      if: (failure() || steps.codeql_analysis.outcome == 'failure') && inputs.channel_id != 'NO_SLACK'
      with:
        title: "CodeQL Actions Scan"
        warningOnly: ${{ steps.codeql_analysis.outcome == 'success' }}
        channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
        SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
